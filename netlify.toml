# Configuración de Netlify para ARAU (Eleventy + Sveltia CMS)
[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# Cabeceras de seguridad básicas
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# CSS y JS cambian en cada deploy con la misma URL → siempre revalidar
# (el navegador hace un check barato: 304 si no cambió, fresco tras deploy).
# Así no hace falta Ctrl+Shift+R para ver los cambios.
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fuentes self-hosted: cache muy largo e inmutable
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes: cache largo
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
