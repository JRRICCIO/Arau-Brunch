# Configuración de Netlify para ARAU (Eleventy + Sveltia CMS)
[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

# Cabeceras de seguridad básicas
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Cache largo para los assets estáticos
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Fuentes self-hosted: cache muy largo e inmutable
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Imágenes: cache largo
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
